# ============================================
# Spring Boot Application Configuration
# ============================================

# Application Name
spring.application.name=ecom-proj

# ============================================
# Database Configuration
# ============================================

# H2 Database (for development)
spring.datasource.url=jdbc:h2:mem:telusko
spring.datasource.driverClassName=org.h2.Driver

# MySQL Database (for production - uncomment and configure)
# spring.datasource.url=jdbc:mysql://localhost:3306/ecommerce
# spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
# spring.datasource.username=root
# spring.datasource.password=your_password

# JPA Configuration
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=true

# ============================================
# Redis Configuration
# ============================================

spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.cache.type=redis

# ============================================
# Stripe Configuration
# ============================================

stripe.api.key=sk_test_YOUR_STRIPE_SECRET_KEY

# ============================================
# Server Configuration
# ============================================

server.port=8080
server.servlet.context-path=/
server.compression.enabled=true

# ============================================
# Logging Configuration
# ============================================

logging.level.root=INFO
logging.level.com.telusko=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.file.name=logs/ecom-app.log

# ============================================
# Security Configuration
# ============================================

# Session timeout (in seconds)
server.servlet.session.timeout=1800

# ============================================
# Jackson Configuration (JSON)
# ============================================

spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.serialization.indent-output=true
